<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Sticker Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Thai',sans-serif;background:#f0f2f5;padding:24px;}

.controls{max-width:720px;margin:0 auto 24px;background:#fff;border-radius:14px;
  padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.09);}
h1{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:#1a1a2e;
  display:flex;align-items:center;gap:8px;}
.url-box{margin-bottom:14px;}
label{font-size:.75rem;color:#888;display:block;margin-bottom:4px;letter-spacing:.5px;}
.url-input{width:100%;padding:10px 13px;border:1.5px solid #e0e0e0;border-radius:8px;
  font-size:.83rem;font-family:'Space Mono',monospace;outline:none;color:#333;background:#fafafa;}
.url-input:focus{border-color:#f5c400;background:#fff;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
.fld label{font-size:.73rem;color:#888;display:block;margin-bottom:4px;}
select,input[type=number]{padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:7px;
  font-size:.82rem;outline:none;font-family:inherit;background:#fafafa;}
select:focus,input:focus{border-color:#f5c400;}
.btns{display:flex;gap:9px;}
.btn{padding:10px 22px;border-radius:8px;font-family:inherit;font-size:.85rem;
  font-weight:700;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;gap:7px;}
.btn-gen{background:#f5c400;color:#1a1a1a;}
.btn-gen:hover{background:#ffe040;}
.btn-print{background:#1a1a2e;color:#fff;}
.btn-print:hover{background:#2e2e5e;}
.tip{background:#fffbf0;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;
  font-size:.75rem;color:#92400e;line-height:1.7;margin-top:12px;}

/* Grid */
.section-title{max-width:720px;margin:0 auto 12px;
  font-size:.7rem;letter-spacing:3px;color:#aaa;text-transform:uppercase;
  font-family:'Space Mono',monospace;}
.grid{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* Sticker */
.sticker{background:#fff;border-radius:10px;border:2px solid #e0e0e0;
  padding:10px 10px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);
  display:flex;flex-direction:column;align-items:center;gap:5px;}
.sticker-header{width:100%;background:#1a1a2e;border-radius:6px;padding:5px 10px;
  display:flex;align-items:center;justify-content:space-between;}
.sticker-brand{font-family:'Space Mono',monospace;font-size:.52rem;
  color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;}
.sticker-ch{font-family:'Space Mono',monospace;font-size:.75rem;
  font-weight:700;color:#f5c400;}
.qr-img{width:110px;height:110px;display:block;border-radius:4px;}
.qr-loading{width:110px;height:110px;display:flex;align-items:center;justify-content:center;
  background:#f5f5f5;border-radius:4px;font-size:.65rem;color:#aaa;}
.sticker-num{font-family:'Space Mono',monospace;font-size:1.5rem;
  font-weight:700;color:#1a1a2e;line-height:1;}
.sticker-label{font-size:.58rem;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;}
.sticker-url{width:100%;border-top:1px dashed #eee;padding-top:5px;margin-top:2px;
  font-size:.53rem;color:#ccc;word-break:break-all;font-family:'Space Mono',monospace;}

/* Admin sticker — yellow border */
.sticker.admin-sticker{border-color:#f5c400;background:#fffbf0;}
.sticker.admin-sticker .sticker-header{background:#f5c400;}
.sticker.admin-sticker .sticker-brand{color:rgba(0,0,0,.4);}
.sticker.admin-sticker .sticker-ch{color:#1a1a2e;}

@media print{
  body{padding:4px;background:#fff;}
  .controls,.section-title{display:none;}
  .grid{max-width:100%;gap:6px;padding:4px;}
  .sticker{box-shadow:none!important;border:1.5px solid #ccc!important;
    break-inside:avoid;page-break-inside:avoid;}
}
</style>
</head>
<body>

<div class="controls">
  <h1>🖨️ QR Sticker Generator — 18 Lockers</h1>

  <div class="url-box">
    <label>🌐 URL ของเว็บ (ตรวจพบอัตโนมัติ)</label>
    <input class="url-input" id="auto-url" readonly>
  </div>

  <div class="url-box">
    <label>✏️ หรือพิมพ์ URL เอง (ถ้าต้องการเปลี่ยน)</label>
    <input class="url-input" id="base-url" placeholder="https://pratchawin6.github.io/locker/locker.html">
    <div class="tip" style="margin-top:6px">
      💡 GitHub Pages URL รูปแบบ: <b>https://ชื่อของคุณ.github.io/locker/locker.html</b>
    </div>
  </div>

  <div class="row">
    <div class="fld">
      <label>ขนาด QR (px)</label>
      <select id="qr-size">
        <option value="80">เล็ก (80px)</option>
        <option value="110" selected>กลาง (110px)</option>
        <option value="150">ใหญ่ (150px)</option>
      </select>
    </div>
    <div class="fld">
      <label>ช่องที่</label>
      <select id="from-ch" onchange="updateToMin()">
        <option value="1">01</option><option value="2">02</option><option value="3">03</option>
        <option value="4">04</option><option value="5">05</option><option value="6">06</option>
        <option value="7">07</option><option value="8">08</option><option value="9">09</option>
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
        <option value="13">13</option><option value="14">14</option><option value="15">15</option>
        <option value="16">16</option><option value="17">17</option><option value="18">18</option>
      </select>
    </div>
    <div class="fld">
      <label>ถึง</label>
      <select id="to-ch">
        <option value="1">01</option><option value="2">02</option><option value="3">03</option>
        <option value="4">04</option><option value="5">05</option><option value="6">06</option>
        <option value="7">07</option><option value="8">08</option><option value="9">09</option>
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
        <option value="13">13</option><option value="14">14</option><option value="15">15</option>
        <option value="16">16</option><option value="17">17</option><option value="18">18</option>
      </select>
    </div>
    <div class="fld">
      <label>&nbsp;</label>
      <label style="display:flex;align-items:center;gap:6px;padding:9px 0;cursor:pointer;">
        <input type="checkbox" id="include-admin" checked>
        <span style="font-size:.8rem;">รวม QR Admin</span>
      </label>
    </div>
  </div>

  <div class="btns">
    <button class="btn btn-gen" onclick="generateAll()">🔄 สร้าง QR</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ พิมพ์สติ๊กเกอร์</button>
  </div>
</div>

<div class="section-title" id="section-label">QR STICKER PREVIEW — คลิก "พิมพ์สติ๊กเกอร์" เพื่อพิมพ์</div>
<div class="grid" id="grid"></div>

<script>
const pad = n => String(n).padStart(2,'0');

// Auto-detect URL
(function(){
  const loc = window.location;
  const base = loc.origin + loc.pathname.replace('qrgen.html','');
  const autoUrl = base + 'locker.html';
  document.getElementById('auto-url').value = autoUrl;
  document.getElementById('base-url').value = autoUrl;
})();

// Set default to-ch = 18
document.getElementById('to-ch').value = '18';

function updateToMin(){
  const f = parseInt(document.getElementById('from-ch').value);
  const t = document.getElementById('to-ch');
  if(parseInt(t.value) < f) t.value = f;
}

// Build QR image URL using free QR API (no library needed)
function qrUrl(data, size){
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}&margin=6&ecc=M&color=1a1a2e`;
}

function makeSticker(num, ch, url, size, isAdmin){
  const sticker = document.createElement('div');
  sticker.className = 'sticker' + (isAdmin ? ' admin-sticker' : '');

  const hdr = document.createElement('div');
  hdr.className = 'sticker-header';
  hdr.innerHTML = `<span class="sticker-brand">${isAdmin ? 'ADMIN' : 'QRLOCKER'}</span>
    <span class="sticker-ch">${isAdmin ? 'ADMIN' : ch}</span>`;
  sticker.appendChild(hdr);

  // QR image via API
  const img = document.createElement('img');
  img.className = 'qr-img';
  img.width = size;
  img.height = size;
  img.style.width = size + 'px';
  img.style.height = size + 'px';

  // Show loading placeholder first
  const loading = document.createElement('div');
  loading.className = 'qr-loading';
  loading.textContent = '⏳ กำลังโหลด...';
  sticker.appendChild(loading);

  img.onload = () => {
    loading.replaceWith(img);
  };
  img.onerror = () => {
    loading.textContent = '❌ โหลดไม่ได้';
    loading.style.color = '#f44';
  };
  img.src = qrUrl(url, size);

  const numEl = document.createElement('div');
  numEl.className = 'sticker-num';
  numEl.textContent = isAdmin ? 'ADMIN' : pad(num);
  sticker.appendChild(numEl);

  const lbl = document.createElement('div');
  lbl.className = 'sticker-label';
  lbl.textContent = isAdmin ? 'Admin Dashboard' : 'QR Locker Channel';
  sticker.appendChild(lbl);

  const urlEl = document.createElement('div');
  urlEl.className = 'sticker-url';
  urlEl.textContent = url;
  sticker.appendChild(urlEl);

  return sticker;
}

function generateAll(){
  const customUrl = document.getElementById('base-url').value.trim();
  const baseUrl   = customUrl || document.getElementById('auto-url').value.trim();
  const cleanBase = baseUrl.replace(/\?.*$/, '').replace(/locker\.html$/, '');
  const lockerUrl = cleanBase + 'locker.html';
  const adminUrl  = cleanBase + 'admin.html';

  const size  = parseInt(document.getElementById('qr-size').value);
  const from  = parseInt(document.getElementById('from-ch').value);
  const to    = parseInt(document.getElementById('to-ch').value);
  const incAdmin = document.getElementById('include-admin').checked;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Locker stickers
  for(let i = from; i <= to; i++){
    const ch  = `QRCH${pad(i)}`;
    const url = `${lockerUrl}?ch=${ch}`;
    grid.appendChild(makeSticker(i, ch, url, size, false));
  }

  // Admin sticker
  if(incAdmin){
    grid.appendChild(makeSticker(0, 'ADMIN', adminUrl, size, true));
  }

  document.getElementById('section-label').textContent =
    `QR STICKER PREVIEW — ${to - from + 1 + (incAdmin?1:0)} สติ๊กเกอร์ — คลิก "พิมพ์สติ๊กเกอร์" เพื่อพิมพ์`;
}

// Auto generate on load
generateAll();
</script>
</body>
</html>
